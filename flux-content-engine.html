<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #FFF; }
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 260px; background: #F5F5F5; border-right: 1px solid #E0E0E0; padding: 20px 0; overflow-y: auto; display: flex; flex-direction: column; }
.logo { padding: 0 16px 24px; }
.logo-text { font-size: 20px; font-weight: 800; color: #1B4D7C; line-height: 1.1; }
.nav { flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-item { padding: 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #666; border: none; background: transparent; transition: all 0.2s; font-family: inherit; text-align: left; width: 100%; }
.nav-item.active { background: #E8F0F8; color: #1B4D7C; font-weight: 600; border-left: 3px solid #1B4D7C; }
.sidebar-footer { padding: 12px; border-top: 1px solid #E0E0E0; display: flex; gap: 6px; }
.sidebar-footer button { flex: 1; padding: 8px; font-size: 11px; background: #1B4D7C; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
.main { flex: 1; overflow-y: auto; padding: 32px; max-width: 1200px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.h1 { font-size: 32px; font-weight: 700; color: #1B4D7C; margin: 0; }
.lang-toggle { display: flex; gap: 8px; }
.lang-btn { padding: 8px 12px; border: 1px solid #1B4D7C; background: transparent; color: #1B4D7C; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
.lang-btn.active { background: #1B4D7C; color: white; }
.form-group { margin-bottom: 16px; }
.label { display: block; font-size: 12px; font-weight: 600; color: #1B4D7C; margin-bottom: 8px; text-transform: uppercase; }
input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #E0E0E0; border-radius: 6px; font-size: 14px; font-family: inherit; }
.platform-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px; }
.platform-btn { padding: 10px; border: 1px solid #E0E0E0; background: white; border-radius: 6px; cursor: pointer; text-align: center; font-size: 12px; color: #666; }
.platform-btn.active { border-color: #1B4D7C; background: #E8F0F8; color: #1B4D7C; font-weight: 600; }
.button { padding: 12px 20px; background: #1B4D7C; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; }
.button:hover { opacity: 0.9; }
.card { padding: 16px; border: 1px solid #E0E0E0; border-radius: 6px; background: white; margin-bottom: 12px; }
.variation-card { padding: 16px; border: 1px solid #E0E0E0; border-radius: 6px; background: white; margin-bottom: 16px; }
.variation-title { font-weight: 600; color: #1B4D7C; margin-bottom: 8px; }
.variation-content { white-space: pre-wrap; font-size: 13px; color: #333; margin-bottom: 12px; line-height: 1.6; }
.rating { display: flex; gap: 4px; margin-top: 8px; }
.star { font-size: 20px; cursor: pointer; color: #D0D0D0; }
.star.active { color: #1B4D7C; }
.section { display: none; }
.section.active { display: block; }
.dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.stat-card { padding: 16px; border: 1px solid #E0E0E0; border-radius: 6px; background: #F5F5F5; }
.stat-number { font-size: 24px; font-weight: 700; color: #1B4D7C; }
.stat-label { font-size: 12px; color: #999; margin-top: 4px; }
.best-badge { margin-top: 8px; font-size: 12px; color: #1B4D7C; font-weight: 600; }
.generated-title { color: #1B4D7C; font-size: 18px; font-weight: 600; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-text">FLUX<br>STRATEGY</div>
      <div style="font-size: 20px; font-weight: 800; color: #999; margin-top: 6px; text-align: left;">CONTENT ENGINE</div>
    </div>
    <div class="nav">
      <button class="nav-item active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="nav-item" onclick="switchTab('clients')">Client Mgmt</button>
      <button class="nav-item" onclick="switchTab('discover')">Topics</button>
      <button class="nav-item" onclick="switchTab('generate')">Generate</button>
      <button class="nav-item" onclick="switchTab('history')">History</button>
    </div>
    <div class="sidebar-footer">
      <button onclick="exportData()">Backup</button>
      <button onclick="importData()">Import</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h1 class="h1" id="pageTitle">Dashboard</h1>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLanguage('tc')">繁</button>
        <button class="lang-btn" onclick="setLanguage('sc')">简</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
      </div>
    </div>

    <div class="section active" id="dashboard">
      <div class="form-group">
        <label class="label" data-key="apiKey" data-required="true">API Key *</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." onchange="saveApiKey()">
      </div>
      <div class="dashboard-grid">
        <div class="stat-card">
          <div class="stat-number" id="clientCount">0</div>
          <div class="stat-label">Clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="contentCount">0</div>
          <div class="stat-label">Content Items</div>
        </div>
      </div>
    </div>

    <div class="section" id="clients">
      <div class="form-group">
        <label class="label" data-key="clientName" data-required="true">Client Name *</label>
        <input type="text" id="clientName" placeholder="Enter client name...">
      </div>
      <div class="form-group">
        <label class="label" data-key="industry">Industry</label>
        <select id="clientIndustry">
          <option value="">Select industry...</option>
          <option value="beauty">Beauty & Personal Care (美容護膚)</option>
          <option value="fashion">Fashion & Apparel (時尚服裝)</option>
          <option value="food">Food & Beverage (食品飲料)</option>
          <option value="technology">Technology (科技)</option>
          <option value="finance">Finance & Banking (金融)</option>
          <option value="health">Health & Wellness (健康)</option>
          <option value="realestate">Real Estate (房地產)</option>
          <option value="travel">Travel & Tourism (旅遊)</option>
          <option value="education">Education (教育)</option>
          <option value="entertainment">Entertainment (娛樂)</option>
          <option value="ecommerce">E-commerce (電商)</option>
          <option value="luxury">Luxury Goods (奢侈品)</option>
          <option value="automotive">Automotive (汽車)</option>
          <option value="fitness">Fitness & Sports (運動健身)</option>
          <option value="home">Home & Living (家居生活)</option>
          <option value="other">Other (其他)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label" data-key="brandTone" data-required="true">Brand Tone *</label>
        <select id="clientTone">
          <option value="professional">Professional</option>
          <option value="casual">Casual</option>
          <option value="luxury">Luxury</option>
          <option value="energetic">Energetic</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label" data-key="brandStory">Brand Story</label>
        <textarea id="clientBrandStory" placeholder="Brand background, mission, values..." style="min-height: 80px; resize: vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="label" data-key="targetAudience">Target Audience</label>
        <textarea id="clientTargetAudience" placeholder="Age, gender, interests, income level..." style="min-height: 80px; resize: vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="label" data-key="competitors">Competitors</label>
        <textarea id="clientCompetitors" placeholder="Main competitors, e.g., Brand A, Brand B..." style="min-height: 80px; resize: vertical;"></textarea>
      </div>
      <div class="form-group">
        <label class="label" data-key="forbiddenWords">Forbidden Words</label>
        <textarea id="clientForbiddenWords" placeholder="Words to avoid, e.g., cheap, discount, sale..." style="min-height: 80px; resize: vertical;"></textarea>
      </div>
      <button class="button" onclick="addClient()">Add Client</button>
      <h2 style="color: #1B4D7C; margin-top: 24px; font-size: 18px;">Your Clients</h2>
      <div id="clientsList"></div>
    </div>

    <div class="section" id="generate">
      <div class="form-group">
        <label class="label" data-key="selectClient" data-required="true">Select Client *</label>
        <select id="selectClient" onchange="selectCurrentClient()">
          <option value="">Choose client...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label" data-key="topic" data-required="true">Topic / Idea *</label>
        <input type="text" id="topic" placeholder="e.g., Spring Collection">
      </div>
      <div class="form-group">
        <label class="label" data-key="platforms" data-required="true">Select Platforms *</label>
        <div class="platform-grid">
          <button class="platform-btn" onclick="togglePlatform('facebook')">Facebook</button>
          <button class="platform-btn" onclick="togglePlatform('instagram')">Instagram</button>
          <button class="platform-btn" onclick="togglePlatform('threads')">Threads</button>
          <button class="platform-btn" onclick="togglePlatform('linkedin')">LinkedIn</button>
          <button class="platform-btn" onclick="togglePlatform('xiaohongshu')">小紅書</button>
          <button class="platform-btn" onclick="togglePlatform('wechat')">微信</button>
        </div>
      </div>
      <div class="form-group">
        <label class="label" data-key="contentLanguage">Content Language</label>
        <select id="contentLanguage">
          <option value="tc">Traditional Chinese (繁體中文)</option>
          <option value="sc">Simplified Chinese (簡體中文)</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="button" onclick="generateContent()">Generate</button>
      <div id="generatedContent"></div>
    </div>

    <div class="section" id="history">
      <div id="historyList"></div>
    </div>

    <div class="section" id="discover">
      <div class="form-group">
        <label class="label" data-key="selectClient" data-required="true">Select Client *</label>
        <select id="discoverSelectClient">
          <option value="">Choose client...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label">Content Direction (Optional)</label>
        <input type="text" id="discoverContentDirection" placeholder="e.g., Health Insurance, Retirement Life...">
      </div>
      <div class="form-group">
        <label class="label" data-key="platforms" data-required="true">Select Platform *</label>
        <select id="discoverPlatform">
          <option value="">Choose platform...</option>
          <option value="facebook">Facebook</option>
          <option value="instagram">Instagram</option>
          <option value="threads">Threads</option>
          <option value="linkedin">LinkedIn</option>
          <option value="xiaohongshu">小紅書</option>
          <option value="wechat">WeChat</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label" data-key="contentLanguage" data-required="true">Content Language *</label>
        <select id="discoverContentLanguage">
          <option value="tc">Traditional Chinese (繁體中文)</option>
          <option value="sc">Simplified Chinese (簡體中文)</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="button" onclick="generateTopicSuggestions()">Generate Topic Suggestions</button>
      <div id="topicSuggestions" style="margin-top: 24px;"></div>
    </div>
  </div>
</div>

<script>
const LANGS = {
  tc: {
    dashboard: '儀表板', clients: '客戶管理', discover: '發現趨勢', generate: '生成內容', history: '歷史記錄',
    apiKey: 'API Key', clientName: '客戶名稱', brandTone: '品牌語氣', addClient: '添加客戶', selectClient: '選擇客戶',
    topic: '話題', platforms: '選擇平台', yourClients: '你的客戶', generated: '生成的內容',
    chooseClient: '選擇客戶', topicPlaceholder: '例如：春季系列',
    professional: '專業', casual: '輕鬆', luxury: '奢華', energetic: '活力',
    backup: '備份', import: '匯入', generate: '生成', contentLanguage: '生成內容語言',
    brandStory: '品牌背景', targetAudience: '目標受眾', competitors: '競爭對手', forbiddenWords: '禁用詞彙',
    industry: '行業'
  },
  sc: {
    dashboard: '仪表板', clients: '客户管理', discover: '发现趋势', generate: '生成内容', history: '历史记录',
    apiKey: 'API Key', clientName: '客户名称', brandTone: '品牌语气', addClient: '添加客户', selectClient: '选择客户',
    topic: '话题', platforms: '选择平台', yourClients: '你的客户', generated: '生成的内容',
    chooseClient: '选择客户', topicPlaceholder: '例如：春季系列',
    professional: '专业', casual: '轻松', luxury: '奢华', energetic: '活力',
    backup: '备份', import: '导入', generate: '生成', contentLanguage: '生成内容语言',
    brandStory: '品牌背景', targetAudience: '目标受众', competitors: '竞争对手', forbiddenWords: '禁用词汇',
    industry: '行业'
  },
  en: {
    dashboard: 'Dashboard', clients: 'Client Mgmt', discover: 'Topics', generate: 'Generate', history: 'History',
    apiKey: 'API Key', clientName: 'Client Name', brandTone: 'Brand Tone', addClient: 'Add Client', selectClient: 'Select Client',
    topic: 'Topic', platforms: 'Select Platforms', yourClients: 'Your Clients', generated: 'Generated Content',
    chooseClient: 'Choose client', topicPlaceholder: 'e.g., Spring Collection',
    professional: 'Professional', casual: 'Casual', luxury: 'Luxury', energetic: 'Energetic',
    backup: 'Backup', import: 'Import', generate: 'Generate', contentLanguage: 'Content Language',
    brandStory: 'Brand Story', targetAudience: 'Target Audience', competitors: 'Competitors', forbiddenWords: 'Forbidden Words',
    industry: 'Industry'
  }
};

let currentLang = 'tc';
let clients = [];
let currentClient = null;
let history = [];
let selectedPlatforms = [];
let generatedVariations = [];

function setLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  updatePageTitle();
  updateAllUI();
  saveData();
}

function updatePageTitle() {
  const titles = {
    dashboard: LANGS[currentLang].dashboard,
    clients: LANGS[currentLang].clients,
    discover: LANGS[currentLang].discover,
    generate: LANGS[currentLang].generate,
    history: LANGS[currentLang].history
  };
  const activeTab = document.querySelector('.section.active')?.id || 'dashboard';
  document.getElementById('pageTitle').textContent = titles[activeTab] || 'Dashboard';
}

function updateAllUI() {
  const t = LANGS[currentLang];
  
  // Update sidebar nav items
  const navItems = document.querySelectorAll('.nav-item');
  const navLabels = [t.dashboard, t.clients, t.discover, t.generate, t.history];
  navItems.forEach((item, i) => {
    if (navLabels[i]) item.textContent = navLabels[i];
  });
  
  // Update all labels using data-key attribute
  document.querySelectorAll('.label[data-key]').forEach(label => {
    const key = label.getAttribute('data-key');
    const isRequired = label.getAttribute('data-required') === 'true';
    const suffix = isRequired ? ' *' : '';
    
    if (t[key]) {
      label.textContent = t[key].toUpperCase() + suffix;
    }
  });
  
  document.querySelector('button[onclick="addClient()"]').textContent = t.addClient;
  document.querySelector('button[onclick="generateContent()"]').textContent = t.generate;
  
  const backup = document.querySelector('button[onclick="exportData()"]');
  const importBtn = document.querySelector('button[onclick="importData()"]');
  if (backup) backup.textContent = t.backup;
  if (importBtn) importBtn.textContent = t.import;
  
  const selectClient = document.getElementById('selectClient');
  if (selectClient && selectClient.options[0]) {
    selectClient.options[0].textContent = t.chooseClient;
  }
  
  document.getElementById('topic').placeholder = t.topicPlaceholder;
  
  const yourClientsHeader = document.querySelector('h2');
  if (yourClientsHeader) yourClientsHeader.textContent = t.yourClients;
}

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');
  updatePageTitle();
}

function addClient() {
  const name = document.getElementById('clientName').value;
  const industry = document.getElementById('clientIndustry').value;
  const tone = document.getElementById('clientTone').value;
  const brandStory = document.getElementById('clientBrandStory').value;
  const targetAudience = document.getElementById('clientTargetAudience').value;
  const competitors = document.getElementById('clientCompetitors').value;
  const forbiddenWords = document.getElementById('clientForbiddenWords').value;
  
  if (!name) return;
  
  // Check if editing existing client
  if (currentClient && clients.find(c => c.id === currentClient.id)) {
    // Update existing client
    const clientIndex = clients.findIndex(c => c.id === currentClient.id);
    clients[clientIndex] = {
      id: currentClient.id,
      name: name,
      industry: industry,
      tone: tone,
      brandStory: brandStory,
      targetAudience: targetAudience,
      competitors: competitors,
      forbiddenWords: forbiddenWords
    };
    alert('✅ Client updated: ' + name);
  } else {
    // Add new client
    const newClient = {
      id: Date.now(),
      name: name,
      industry: industry,
      tone: tone,
      brandStory: brandStory,
      targetAudience: targetAudience,
      competitors: competitors,
      forbiddenWords: forbiddenWords
    };
    clients.push(newClient);
    currentClient = newClient;
    alert('✅ Client added: ' + name);
  }
  
  // Clear all inputs
  document.getElementById('clientName').value = '';
  document.getElementById('clientIndustry').value = '';
  document.getElementById('clientTone').value = 'professional';
  document.getElementById('clientBrandStory').value = '';
  document.getElementById('clientTargetAudience').value = '';
  document.getElementById('clientCompetitors').value = '';
  document.getElementById('clientForbiddenWords').value = '';
  
  currentClient = null;
  updateClientsList();
  updateClientSelect();
  saveData();
}

function selectCurrentClient() {
  const id = parseInt(document.getElementById('selectClient').value);
  currentClient = clients.find(c => c.id === id) || null;
}

function togglePlatform(id) {
  const btn = event.target;
  if (selectedPlatforms.includes(id)) {
    selectedPlatforms = selectedPlatforms.filter(p => p !== id);
    btn.classList.remove('active');
  } else {
    selectedPlatforms.push(id);
    btn.classList.add('active');
  }
}

function updateClientsList() {
  const list = document.getElementById('clientsList');
  list.innerHTML = clients.map(c => {
    let cardHtml = '<div class="card" style="padding: 12px; border: 1px solid #E0E0E0; border-radius: 6px; margin-bottom: 12px;">';
    cardHtml += '<div style="display: flex; justify-content: space-between; align-items: center;">';
    cardHtml += '<div onclick="selectClientById(' + c.id + ')" style="cursor:pointer; flex: 1;">';
    cardHtml += '<div style="font-weight:600; color: #1B4D7C;">' + c.name + '</div>';
    cardHtml += '<div style="font-size:12px; color:#999; margin-top: 4px;">Tone: ' + c.tone + '</div>';
    if (c.brandStory) cardHtml += '<div style="font-size:11px; color:#BBB; margin-top: 2px;">📝 Has story</div>';
    cardHtml += '</div>';
    cardHtml += '<button onclick="editClient(' + c.id + ')" style="padding: 6px 12px; background: #1B4D7C; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">Edit</button>';
    cardHtml += '</div>';
    cardHtml += '</div>';
    return cardHtml;
  }).join('');
}

function selectClientById(id) {
  currentClient = clients.find(c => c.id === id);
  document.getElementById('selectClient').value = id;
}

function editClient(id) {
  const client = clients.find(c => c.id === id);
  if (!client) return;
  
  // Load client data into form
  document.getElementById('clientName').value = client.name;
  document.getElementById('clientIndustry').value = client.industry || '';
  document.getElementById('clientTone').value = client.tone;
  document.getElementById('clientBrandStory').value = client.brandStory || '';
  document.getElementById('clientTargetAudience').value = client.targetAudience || '';
  document.getElementById('clientCompetitors').value = client.competitors || '';
  document.getElementById('clientForbiddenWords').value = client.forbiddenWords || '';
  
  currentClient = client;
  
  // Scroll to form
  document.getElementById('clientName').focus();
  alert('Editing: ' + client.name + '\n\nUpdate and click "Add Client" to save');
}

function updateClientSelect() {
  const sel = document.getElementById('selectClient');
  const discoverSel = document.getElementById('discoverSelectClient');
  const optionsHtml = '<option value="">Choose client...</option>' + clients.map(c => '<option value="' + c.id + '">' + c.name + '</option>').join('');
  
  sel.innerHTML = optionsHtml;
  if (discoverSel) {
    discoverSel.innerHTML = optionsHtml;
  }
}

function generateTopicSuggestions() {
  const clientId = parseInt(document.getElementById('discoverSelectClient').value);
  const platform = document.getElementById('discoverPlatform').value;
  const contentDirection = document.getElementById('discoverContentDirection').value;
  const contentLang = document.getElementById('discoverContentLanguage').value;
  
  if (!clientId || !platform) {
    alert('Please select client and platform');
    return;
  }
  
  const client = clients.find(c => c.id === clientId);
  if (!client) {
    alert('Client not found');
    return;
  }
  
  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) {
    alert('Please set API Key first');
    return;
  }
  
  const languageMap = {
    tc: 'Traditional Chinese',
    sc: 'Simplified Chinese',
    en: 'English'
  };
  
  const btn = document.querySelector('button[onclick="generateTopicSuggestions()"]');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  
  const prompt = 'Generate 8 social media content topic suggestions for ' + client.name + ' (Industry: ' + client.industry + ')\n\n' +
    'Client Info:\n' +
    'Brand tone: ' + client.tone + '\n' +
    (client.brandStory ? 'Brand story: ' + client.brandStory + '\n' : '') +
    (client.targetAudience ? 'Target audience: ' + client.targetAudience + '\n' : '') +
    (client.competitors ? 'Competitors: ' + client.competitors + '\n' : '') +
    '\nPlatform: ' + platform + '\n' +
    'Content Language: ' + languageMap[contentLang] + '\n' +
    (contentDirection ? 'Content Direction: ' + contentDirection + '\n' : '') +
    '\nGenerate 8 topics using these 7 angles (mix them for 8 total):\n' +
    '1. Sales/Promotion\n' +
    '2. Education/Tips\n' +
    '3. Entertainment/Fun\n' +
    '4. Engagement/Interaction\n' +
    '5. Seasonal/Trending\n' +
    '6. Daily Life/Relatable\n' +
    '7. Habits/Routines\n\n' +
    'Format EXACTLY like this for each topic:\n' +
    '[Topic #]\n' +
    'Angle: [angle name]\n' +
    'Title: [2-3 word title]\n' +
    'Description: [2-3 sentence explanation of why this topic is good for this client on this platform]';
  
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      alert('API Error: ' + data.error.message);
      btn.disabled = false;
      btn.textContent = 'Generate Topic Suggestions';
      return;
    }
    
    if (!data.content || !data.content[0]) {
      alert('No response from API');
      btn.disabled = false;
      btn.textContent = 'Generate Topic Suggestions';
      return;
    }
    
    const suggestions = parseTopicSuggestions(data.content[0].text);
    displayTopicSuggestions(suggestions);
    
    btn.disabled = false;
    btn.textContent = 'Generate Topic Suggestions';
  })
  .catch(err => {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Generate Topic Suggestions';
  });
}

function parseTopicSuggestions(text) {
  const suggestions = [];
  const topicBlocks = text.split(/\[Topic \d+\]/i).filter(block => block.trim());
  
  topicBlocks.forEach((block, index) => {
    const lines = block.trim().split('\n');
    let angle = '';
    let title = '';
    let description = '';
    
    lines.forEach(line => {
      if (line.includes('Angle:')) angle = line.replace('Angle:', '').trim();
      if (line.includes('Title:')) title = line.replace('Title:', '').trim();
      if (line.includes('Description:')) description = line.replace('Description:', '').trim();
    });
    
    // If no title found, use first non-empty line
    if (!title) {
      const nonEmptyLines = lines.filter(l => l.trim());
      if (nonEmptyLines.length > 0) title = nonEmptyLines[0].trim();
    }
    
    if (title) {
      suggestions.push({
        id: 'topic_' + Date.now() + '_' + index,
        angle: angle || 'General',
        title: title,
        description: description
      });
    }
  });
  
  return suggestions.slice(0, 8);
}

function displayTopicSuggestions(suggestions) {
  const div = document.getElementById('topicSuggestions');
  
  if (suggestions.length === 0) {
    div.innerHTML = '<p style="color: #999;">No suggestions generated. Please try again.</p>';
    return;
  }
  
  let html = '<div style="margin-top: 16px;">';
  
  suggestions.forEach(sug => {
    html += '<div class="card" style="margin-bottom: 16px; padding: 16px; border: 1px solid #E0E0E0; border-radius: 6px;">';
    html += '<div style="display: flex; justify-content: space-between; align-items: flex-start;">';
    html += '<div style="flex: 1;">';
    html += '<div style="color: #1B4D7C; font-weight: 600; margin-bottom: 4px;">' + sug.title + '</div>';
    html += '<div style="color: #999; font-size: 12px; margin-bottom: 8px;">📍 ' + sug.angle + '</div>';
    html += '<div style="color: #666; font-size: 13px; line-height: 1.5;">' + sug.description + '</div>';
    html += '</div>';
    html += '<button onclick="useTopic(\'' + sug.title + '\')" style="margin-left: 12px; padding: 8px 12px; background: #1B4D7C; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap;">Use Topic</button>';
    html += '</div>';
    html += '</div>';
  });
  
  html += '</div>';
  div.innerHTML = html;
}

function useTopic(topicTitle) {
  // Jump to Generate section
  switchTab('generate');
  
  // Fill in topic
  document.getElementById('topic').value = topicTitle;
  
  // Scroll to topic field
  document.getElementById('topic').focus();
}

function cleanHashtags(text) {
  return text.replace(/`#/g, '#').replace(/#([a-zA-Z0-9_]+)`/g, '#$1');
}

function parseVariations(content) {
  const variations = [];
  const parts = content.split(/\[Variation \d+\]/i);
  
  for (let i = 1; i < parts.length; i++) {
    const text = parts[i].trim();
    if (text) {
      variations.push({
        id: 'var_' + Date.now() + '_' + i,
        number: i,
        content: cleanHashtags(text),
        rating: 0,
        isBest: false
      });
    }
  }
  
  return variations.length > 0 ? variations : [{
    id: 'var_' + Date.now() + '_1',
    number: 1,
    content: cleanHashtags(content),
    rating: 0,
    isBest: false
  }];
}

function generateContent() {
  if (!currentClient || selectedPlatforms.length === 0 || !document.getElementById('topic').value) {
    alert('Please fill all fields');
    return;
  }
  
  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) {
    alert('❌ Please set API Key in Dashboard first!\nFormat: sk-ant-...');
    return;
  }
  
  if (!apiKey.startsWith('sk-ant-')) {
    alert('❌ Invalid API Key format!\nShould start with: sk-ant-');
    return;
  }
  
  const topic = document.getElementById('topic').value;
  const contentLang = document.getElementById('contentLanguage').value;
  const languageMap = {
    tc: 'Traditional Chinese (繁體中文)',
    sc: 'Simplified Chinese (簡體中文)',
    en: 'English'
  };
  
  const generateBtn = document.querySelector('button[onclick="generateContent()"]');
  generateBtn.disabled = true;
  generateBtn.textContent = 'Generating...';
  
  const prompt = 'Generate 5 creative social media content variations for: "' + topic + '"\n\n' +
    'BRAND INFORMATION:\n' +
    (currentClient.industry ? 'Industry: ' + currentClient.industry + '\n' : '') +
    'Brand tone: ' + currentClient.tone + '\n' +
    (currentClient.brandStory ? 'Brand story: ' + currentClient.brandStory + '\n' : '') +
    (currentClient.targetAudience ? 'Target audience: ' + currentClient.targetAudience + '\n' : '') +
    (currentClient.competitors ? 'Competitors: ' + currentClient.competitors + '\n' : '') +
    (currentClient.forbiddenWords ? 'Avoid these words: ' + currentClient.forbiddenWords + '\n' : '') +
    '\nPlatforms: ' + selectedPlatforms.join(', ') +
    '\nContent Language: ' + languageMap[contentLang] + '\n\n' +
    'Format each variation clearly with [Variation 1], [Variation 2], [Variation 3], [Variation 4], [Variation 5]\n' +
    'Include captions, emojis, and hashtags.';
  
  console.log('API Key:', apiKey.substring(0, 20) + '...');
  console.log('Topic:', topic);
  console.log('Content Language:', languageMap[contentLang]);
  console.log('Platforms:', selectedPlatforms);
  
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(response => {
    console.log('Response status:', response.status);
    return response.json();
  })
  .then(data => {
    console.log('API Response:', data);
    
    if (data.error) {
      alert('❌ API Error:\n' + data.error.message + '\n\nCheck API Key or rate limits');
      generateBtn.disabled = false;
      generateBtn.textContent = LANGS[currentLang].generate;
      return;
    }
    
    if (!data.content || !data.content[0]) {
      alert('❌ No content in response');
      generateBtn.disabled = false;
      generateBtn.textContent = LANGS[currentLang].generate;
      return;
    }
    
    const content = data.content[0].text;
    console.log('Generated content:', content);
    
    generatedVariations = parseVariations(content);
    console.log('Parsed variations:', generatedVariations.length);
    
    const entry = {
      id: Date.now(),
      clientId: currentClient.id,
      topic: topic,
      variations: generatedVariations,
      platforms: selectedPlatforms,
      contentLanguage: contentLang,
      createdAt: new Date().toISOString()
    };
    
    history.push(entry);
    renderVariations();
    document.getElementById('topic').value = '';
    selectedPlatforms = [];
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    updateStats();
    saveData();
    
    generateBtn.disabled = false;
    generateBtn.textContent = LANGS[currentLang].generate;
  })
  .catch(err => {
    console.error('Fetch error:', err);
    alert('❌ Network Error:\n' + err.message + '\n\nCheck internet connection');
    generateBtn.disabled = false;
    generateBtn.textContent = LANGS[currentLang].generate;
  });
}

function renderVariations() {
  const div = document.getElementById('generatedContent');
  const t = LANGS[currentLang];
  
  if (!generatedVariations || generatedVariations.length === 0) {
    div.innerHTML = '<p>No content generated yet</p>';
    return;
  }
  
  const visibleVariations = generatedVariations.slice(0, 6);
  
  let html = '<div class="generated-container">';
  html += '<div class="generated-title">' + t.generated + ' (' + visibleVariations.length + ')</div>';
  
  // Add cards
  visibleVariations.forEach(v => {
    html += '<div class="variation-card">';
    html += '<div class="variation-title">Variation ' + v.number + '</div>';
    html += '<div class="variation-content">' + v.content + '</div>';
    html += '<div class="rating">';
    for (let i = 1; i <= 5; i++) {
      const starClass = i <= v.rating ? ' active' : '';
      html += '<span class="star' + starClass + '" onclick="rateVariation(\'' + v.id + '\', ' + i + ')">' + (i <= v.rating ? '★' : '☆') + '</span>';
    }
    html += '</div>';
    if (v.isBest) {
      html += '<div class="best-badge">✓ Best</div>';
    }
    html += '</div>';
  });
  
  html += '</div>';
  
  div.innerHTML = html;
  console.log('Rendered variations:', visibleVariations.length);
}

function regenerateContent() {
  alert('🔄 REGENERATE BUTTON WORKS!');
  console.log('Regenerate clicked');
  
  if (!generatedVariations || generatedVariations.length === 0) {
    alert('No content to regenerate');
    return;
  }
  
  const retained = generatedVariations.filter(v => v.rating >= 4);
  
  // Show custom popup instead of confirm()
  const popupMsg = '⚠️ REGENERATE\n\n' +
    '✓ Will keep: ' + retained.length + ' variations (4+ stars)\n' +
    '+ Generate: 3 new variations\n' +
    '= Total: up to 6 variations\n\n' +
    '💡 TIP: Copy content you want first!\n\n' +
    'Continue?';
  
  // Use custom alert with clearer buttons
  if (!confirm(popupMsg)) {
    console.log('User cancelled regenerate');
    return;
  }
  
  console.log('User confirmed regenerate');
  proceedWithRegenerate(retained);
}

function proceedWithRegenerate(retained) {
  if (!currentClient) {
    alert('Select a client first');
    return;
  }
  
  if (selectedPlatforms.length === 0) {
    alert('Select platforms first');
    return;
  }
  
  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) {
    alert('Set API Key first');
    return;
  }
  
  const topic = document.getElementById('topic').value;
  const contentLang = document.getElementById('contentLanguage').value;
  
  const langNames = {
    tc: 'Traditional Chinese',
    sc: 'Simplified Chinese',
    en: 'English'
  };
  
  const btn = document.getElementById('regenerateBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Regenerating...';
  }
  
  const prompt = 'Generate 3 COMPLETELY NEW social media variations for: "' + topic + '"\nTone: ' + currentClient.tone + '\nPlatforms: ' + selectedPlatforms.join(', ') + '\nLanguage: ' + langNames[contentLang] + '\n\nMake these DIFFERENT from before.\nFormat: [Variation 1], [Variation 2], [Variation 3]\nAdd captions, emojis, hashtags.';
  
  console.log('Calling API... Retaining:', retained.length, 'variations');
  
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(r => r.json())
  .then(data => {
    console.log('API response:', data);
    
    if (data.error) {
      alert('❌ ' + data.error.message);
      if (btn) {
        btn.disabled = false;
        btn.textContent = '🔄 Regenerate Content';
      }
      return;
    }
    
    if (!data.content || !data.content[0]) {
      alert('❌ No response from API');
      if (btn) {
        btn.disabled = false;
        btn.textContent = '🔄 Regenerate Content';
      }
      return;
    }
    
    const newVars = parseVariations(data.content[0].text);
    console.log('Generated:', newVars.length, 'new variations');
    
    // Merge: keep ≥4 stars + add new ones (max 6)
    generatedVariations = retained.concat(newVars).slice(0, 6);
    console.log('Total now:', generatedVariations.length);
    
    renderVariations();
    saveData();
    
    if (btn) {
      btn.disabled = false;
      btn.textContent = '🔄 Regenerate Content';
    }
  })
  .catch(err => {
    console.error('Error:', err);
    alert('❌ ' + err.message);
    if (btn) {
      btn.disabled = false;
      btn.textContent = '🔄 Regenerate Content';
    }
  });
}

function rateVariation(varId, rating) {
  const variation = generatedVariations.find(v => v.id === varId);
  if (variation) {
    variation.rating = rating;
    variation.isBest = rating >= 4;
    renderVariations();
    saveData();
  }
}

function updateStats() {
  document.getElementById('clientCount').textContent = clients.length;
  document.getElementById('contentCount').textContent = history.length;
}

function saveData() {
  localStorage.setItem('flux_data', JSON.stringify({ clients: clients, history: history, currentLang: currentLang }));
}

function loadData() {
  const saved = localStorage.getItem('flux_data');
  if (saved) {
    const data = JSON.parse(saved);
    clients = data.clients || [];
    history = data.history || [];
    currentLang = data.currentLang || 'tc';
    updateClientsList();
    updateClientSelect();
    updateStats();
  }
}

function saveApiKey() {
  localStorage.setItem('flux_key', document.getElementById('apiKey').value);
}

function exportData() {
  const data = { clients: clients, history: history };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'flux-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      try {
        const data = JSON.parse(evt.target.result);
        clients = data.clients || [];
        history = data.history || [];
        saveData();
        updateClientsList();
        updateClientSelect();
        updateStats();
        alert('Data imported!');
      } catch (err) {
        alert('Invalid JSON');
      }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

window.addEventListener('load', function() {
  loadData();
  const savedKey = localStorage.getItem('flux_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;
  updateAllUI();
});
</script>
